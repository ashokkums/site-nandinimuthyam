backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME   # ← change this
  branch: main

# Where uploaded images live in the repo / on the deployed site
media_folder: "images"
public_folder: "/images"

collections:
  # --- Single "About" page (one file) ---------------------------------
  - name: "site"
    label: "Site Settings"
    files:
      - name: "about"
        label: "About Page"
        file: "content/about.md"
        fields:
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string", required: false }
          - { label: "Profile Photo", name: "photo", widget: "image", required: false }
          - { label: "Bio", name: "body", widget: "markdown" }

  # --- A collection of portfolio projects (many files) ---------------
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Acting", "Dance", "Film", "Other"]
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Cover Image", name: "cover", widget: "image", required: false }
      - { label: "Short Description", name: "description", widget: "text", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
