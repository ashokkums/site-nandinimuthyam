<head>

<title>Gallery — Nandini Muthyam</title>

<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' fill='%23e17a48' rx='6'/%3E%3Ctext x='20' y='28' text-anchor='middle' font-family='Georgia' font-size='24' fill='%231f160f'%3EN%3C/text%3E%3C/svg%3E" />

<style>
  /* ── Gallery layout ── */
  .gallery-wrap {
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
  }

  /* Height must live on the track — in fade mode Splide absolutely
     positions all slides, so li height alone won't hold the container */
  #gallery-splide .splide__track {
    height: clamp(340px, 72vh, 780px);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--line);
    background: var(--bg-deep);
  }

  /* Slides and list fill the track height */
  #gallery-splide .splide__list,
  #gallery-splide .splide__slide {
    height: 100%;
  }

  /* Centre image within each slide */
  .gallery-slide {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-deep);
  }

  .gallery-slide img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }

  /* ── Splide theme overrides ── */
  .splide__arrow {
    background: var(--bg-raise);
    border: 1px solid var(--line);
    opacity: 1;
    transition: background 0.2s, border-color 0.2s;
  }
  .splide__arrow:hover {
    background: var(--accent);
    border-color: var(--accent);
  }
  .splide__arrow svg { fill: var(--paper); }
  .splide__arrow:hover svg { fill: var(--bg); }

  .splide__pagination__page {
    background: var(--line);
    border: none;
    opacity: 1;
    transition: background 0.2s, transform 0.2s;
  }
  .splide__pagination__page.is-active {
    background: var(--accent);
    transform: scale(1.3);
  }

  /* ── Counter ── */
  .gallery-counter {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: right;
    margin-top: 1rem;
  }
  .gallery-counter span { color: var(--accent); }
</style>
</head>
<body>

  <div class="nav-inner">

      <span class="casting-pill nav-cta">Casting now · 2026</span>
    </div>
  </div>
</nav>

<main class="page">

  <header class="page-header">
    <div class="page-kicker">Section 06 — Stills</div>
    <h1 class="page-title">G<em>a</em>llery</h1>
    <p class="page-lead">
      Frames from the stage, the set, and the space in between.
    </p>
  </header>

  <div class="gallery-wrap">
    <div id="gallery-splide" class="splide" aria-label="Nandini Muthyam photo gallery">
      <div class="splide__track">
        <ul class="splide__list">
          <!-- slides injected by gallery.js from images/manifest.json -->
        </ul>
      </div>
    </div>

    <div class="gallery-counter" id="gallery-counter">
      <span>—</span> / —
    </div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
<script>
/* IMAGE LIST — auto-updated by: node generate-manifest.js */
var GALLERY_IMAGES = [
  "1.webp",
  "10.webp",
  "11.webp",
  "12.webp",
  "13.webp",
  "2.webp",
  "3.webp",
  "4.webp",
  "5.webp",
  "6.webp",
  "7.webp",
  "8.webp",
  "9.webp"
];

(function () {
  var images = GALLERY_IMAGES;
  var total  = images.length;
  if (total === 0) return;

  // Build slides
  var list = document.querySelector('#gallery-splide .splide__list');
  list.innerHTML = images.map(function (src, i) {
    return '<li class="splide__slide gallery-slide">' +
      '<img src="images/' + src + '" alt="Nandini Muthyam — photograph ' + (i + 1) + '"' +
      (i === 0 ? '' : ' loading="lazy"') + ' /></li>';
  }).join('');

  // Counter
  var pad = function (n) { return String(n).padStart(2, '0'); };
  var counter = document.getElementById('gallery-counter');
  counter.innerHTML = '<span>' + pad(1) + '</span> / ' + pad(total);

  // Init Splide
  var splide = new Splide('#gallery-splide', {
    type: 'fade', rewind: true, keyboard: 'global',
    pagination: true, arrows: true, speed: 600,
  });
  splide.on('move', function (newIndex) {
    counter.innerHTML = '<span>' + pad(newIndex + 1) + '</span> / ' + pad(total);
  });
  splide.mount();
})();
</script>
<script src="components.js"></script>
</body>
</html>
