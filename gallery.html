<style>
  /* ── Photo grid ── */
  .photo-grid {
    columns: 3 280px;
    column-gap: 10px;
    margin-top: 2rem;
  }

  .photo-grid-item {
    break-inside: avoid;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    cursor: zoom-in;
    background: var(--bg-raise);
    border: 1px solid var(--line);
  }

  .photo-grid-item img {
    display: block;
    width: 100%;
    height: auto;
    transition: transform 0.4s ease, opacity 0.3s ease;
    opacity: 0.92;
  }

  .photo-grid-item:hover img {
    transform: scale(1.03);
    opacity: 1;
  }

  .photo-grid-item .photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(21,16,11,0.55) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s ease;
    display: flex;
    align-items: flex-end;
    padding: 0.75rem;
  }

  .photo-grid-item:hover .photo-overlay {
    opacity: 1;
  }

  .photo-overlay-num {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--paper);
    opacity: 0.7;
  }

  /* ── Lightbox ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(15, 10, 7, 0.97);
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .lightbox.open {
    display: flex;
  }

  .lightbox-img-wrap {
    position: relative;
    max-width: 90vw;
    max-height: 85vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lightbox-img-wrap img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    display: block;
    border-radius: 2px;
    user-select: none;
    transition: opacity 0.2s ease;
  }

  .lightbox-counter {
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 1rem;
  }

  .lightbox-counter span { color: var(--accent); }

  .lightbox-close {
    position: fixed;
    top: 1.25rem;
    right: 1.5rem;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.5rem;
    cursor: pointer;
    line-height: 1;
    padding: 0.25rem 0.5rem;
    transition: color 0.2s;
    font-family: var(--mono);
  }

  .lightbox-close:hover { color: var(--paper); }

  .lightbox-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: var(--bg-raise);
    border: 1px solid var(--line);
    color: var(--paper);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }

  .lightbox-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  .lightbox-prev { left: 1.25rem; }
  .lightbox-next { right: 1.25rem; }

  @media (max-width: 600px) {
    .photo-grid { columns: 2 140px; column-gap: 6px; }
    .photo-grid-item { margin-bottom: 6px; }
    .lightbox-btn { display: none; }
  }
</style>
</head>

<main class="page">

  <button class="lightbox-close" id="lb-close" aria-label="Close">✕</button>
  <div class="lightbox-img-wrap">
    <img id="lb-img" src="" alt="" />
  </div>

  <button class="lightbox-btn lightbox-prev" id="lb-prev" aria-label="Previous">&#8592;</button>

<script>
/* IMAGE LIST — auto-updated by: node generate-manifest.js */
var GALLERY_IMAGES = [
  "1.webp",
  "2.webp",
  "3.webp",
  "4.webp",
  "5.webp",
  "6.webp",
  "7.webp",
  "8.webp",
  "9.webp"
];

(function () {
  var images = GALLERY_IMAGES;
  var total = images.length;
  if (total === 0) return;

  var grid = document.getElementById('photo-grid');
  var lightbox = document.getElementById('lightbox');
  var lbImg = document.getElementById('lb-img');
  var lbCur = document.getElementById('lb-cur');
  var lbTot = document.getElementById('lb-tot');
  var current = 0;

  var pad = function (n) { return String(n).padStart(2, '0'); };

  lbTot.textContent = pad(total);

  // Build grid
  images.forEach(function (src, i) {
    var item = document.createElement('div');
    item.className = 'photo-grid-item';

    var img = document.createElement('img');
    img.src = 'images/' + src;
    img.alt = 'Nandini Muthyam — photograph ' + (i + 1);
    img.loading = i < 4 ? 'eager' : 'lazy';

    var overlay = document.createElement('div');
    overlay.className = 'photo-overlay';
    var num = document.createElement('span');
    num.className = 'photo-overlay-num';
    num.textContent = pad(i + 1) + ' / ' + pad(total);
    overlay.appendChild(num);

    item.appendChild(img);
    item.appendChild(overlay);
    item.addEventListener('click', function () { open(i); });
    grid.appendChild(item);
  });

  function open(index) {
    current = index;
    lbImg.style.opacity = '0';
    lbImg.src = 'images/' + images[current];
    lbImg.alt = 'Nandini Muthyam — photograph ' + (current + 1);
    lbImg.onload = function () { lbImg.style.opacity = '1'; };
    lbCur.textContent = pad(current + 1);
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function prev() { open((current - 1 + total) % total); }
  function next() { open((current + 1) % total); }

  document.getElementById('lb-close').addEventListener('click', close);
  document.getElementById('lb-prev').addEventListener('click', prev);
  document.getElementById('lb-next').addEventListener('click', next);

  lightbox.addEventListener('click', function (e) {
    if (e.target === lightbox) close();
  });

  document.addEventListener('keydown', function (e) {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') prev();
    if (e.key === 'ArrowRight') next();
  });
})();
</script>
